<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat for Sominik</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
        }
        
        h2 { color: #bb86fc; text-align: center; }

        /* Chat box uvidí jen Sominik */
        #chat-box { 
            border: 1px solid #333; 
            height: 500px; 
            overflow-y: auto; 
            padding: 15px; 
            margin-bottom: 20px; 
            background: #1e1e1e; 
            border-radius: 8px;
            display: none; /* Výchozí stav: skryto */
        }

        .message { 
            margin-bottom: 12px; 
            padding: 10px; 
            border-bottom: 1px solid #333; 
        }

        .nickname { color: #03dac6; font-weight: bold; }

        #input-container { 
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        #message-form { display: flex; gap: 10px; }

        input[type="text"] { 
            flex-grow: 1; 
            padding: 12px; 
            background: #2c2c2c; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 4px;
        }

        button { 
            padding: 10px 20px; 
            background: #bb86fc; 
            color: #000; 
            border: none; 
            font-weight: bold; 
            border-radius: 4px;
            cursor: pointer;
        }

        .hidden { display: none !important; }
        
        .status-msg { color: #888; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 id="title">Poslat zprávu</h2>
    
    <!-- Tento box se zobrazí POUZE Sominikovi -->
    <div id="chat-box"></div>

    <!-- Toto uvidí všichni kromě Sominika -->
    <div id="input-container">
        <form id="message-form">
            <input type="text" id="msg-input" placeholder="Napište zprávu Sominikovi..." maxlength="1000" required>
            <button type="submit">Odeslat</button>
        </form>
        <p class="status-msg">Vaše zprávy uvidí pouze Sominik.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAB-g5RMWD2gGquAqyOFBslUegRUG_15eE",
            authDomain: "appka-fb08e.firebaseapp.com",
            databaseURL: "https://appka-fb08e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "appka-fb08e",
            storageBucket: "appka-fb08e.firebasestorage.app",
            messagingSenderId: "1093616123944",
            appId: "1:1093616123944:web:3fb16b2d1c3c3d4c14b51d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let nickname = prompt("Jakou chcete mít přezdívku?");
        if (!nickname || nickname.trim() === "") nickname = "Anonym";

        const chatBox = document.getElementById('chat-box');
        const inputContainer = document.getElementById('input-container');
        const messageForm = document.getElementById('message-form');
        const msgInput = document.getElementById('msg-input');
        const title = document.getElementById('title');

        // LOGIKA ZOBRAZENÍ
        if (nickname === "Sominik") {
            // Sominik vidí zprávy, ale nemůže psát
            chatBox.style.display = "block";
            inputContainer.classList.add('hidden');
            title.innerText = "Přijaté zprávy (Admin)";
            
            // Načítání zpráv pouze pro Sominika
            onChildAdded(messagesRef, (data) => {
                const val = data.val();
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `<span class="nickname">${val.username}</span> napsal/a: <span>${val.message}</span>`;
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        } else {
            // Ostatní posílají zprávy, ale nevidí chatBox
            messageForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = msgInput.value.trim();
                if (text) {
                    push(messagesRef, {
                        username: nickname,
                        message: text,
                        timestamp: serverTimestamp()
                    });
                    msgInput.value = "";
                    alert("Zpráva byla odeslána Sominikovi.");
                }
            });
        }
    </script>
</body>
</html>

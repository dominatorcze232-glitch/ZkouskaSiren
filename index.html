<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
        }

        #chat-box { 
            border: 1px solid #333; 
            height: 500px; 
            overflow-y: auto; 
            padding: 15px; 
            margin-bottom: 20px; 
            background: #1e1e1e; 
            border-radius: 8px;
            display: none; 
        }

        .message { 
            margin-bottom: 12px; 
            padding: 10px; 
            border-bottom: 1px solid #333; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nickname { color: #03dac6; font-weight: bold; }

        #input-container { 
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        #message-form { display: flex; gap: 10px; }

        input[type="text"] { 
            flex-grow: 1; 
            padding: 12px; 
            background: #2c2c2c; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 4px;
            outline: none;
        }

        input[type="text"]:focus { border-color: #bb86fc; }

        button { 
            padding: 10px 20px; 
            background: #bb86fc; 
            color: #000; 
            border: none; 
            font-weight: bold; 
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn {
            background: #cf6679;
            color: white;
            padding: 5px 10px;
            font-size: 0.8em;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="chat-box"></div>

    <div id="input-container">
        <form id="message-form">
            <input type="text" id="msg-input" placeholder="Zadejte text..." maxlength="1000" required>
            <button type="submit">Odeslat</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAB-g5RMWD2gGquAqyOFBslUegRUG_15eE",
            authDomain: "appka-fb08e.firebaseapp.com",
            databaseURL: "https://appka-fb08e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "appka-fb08e",
            storageBucket: "appka-fb08e.firebasestorage.app",
            messagingSenderId: "1093616123944",
            appId: "1:1093616123944:web:3fb16b2d1c3c3d4c14b51d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let nickname = prompt("Jakou chcete mít přezdívku?");
        if (!nickname || nickname.trim() === "") nickname = "Anonym";

        const chatBox = document.getElementById('chat-box');
        const inputContainer = document.getElementById('input-container');
        const messageForm = document.getElementById('message-form');
        const msgInput = document.getElementById('msg-input');

        if (nickname === "Sominik") {
            chatBox.style.display = "block";
            inputContainer.classList.add('hidden');
            
            onChildAdded(messagesRef, (data) => {
                const val = data.val();
                const key = data.key;
                
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.id = "msg-" + key;
                msgDiv.innerHTML = `
                    <div>
                        <span class="nickname">${val.username}</span> napsal/a: <span>${val.message}</span>
                    </div>
                    <button class="delete-btn" onclick="window.deleteMessage('${key}')">Smazat</button>
                `;
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            window.deleteMessage = (key) => {
                if (confirm("Smazat tuto zprávu?")) {
                    remove(ref(db, 'messages/' + key));
                }
            };

            onChildRemoved(messagesRef, (data) => {
                const msgDiv = document.getElementById("msg-" + data.key);
                if (msgDiv) msgDiv.remove();
            });

        } else {
            messageForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = msgInput.value.trim();
                if (text) {
                    push(messagesRef, {
                        username: nickname,
                        message: text,
                        timestamp: serverTimestamp()
                    });
                    msgInput.value = "";
                }
            });
        }
    </script>
</body>
</html>

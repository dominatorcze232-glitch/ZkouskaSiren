<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Firebase Chat</title>
    <style>
        /* Dark Mode Styly */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
        }
        
        h2 { color: #bb86fc; text-align: center; }

        #chat-box { 
            border: 1px solid #333; 
            height: 500px; 
            overflow-y: auto; 
            padding: 15px; 
            margin-bottom: 20px; 
            background: #1e1e1e; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .message { 
            margin-bottom: 12px; 
            padding: 10px; 
            border-bottom: 1px solid #333; 
            line-break: anywhere;
        }

        .nickname { 
            font-weight: bold; 
            color: #03dac6; 
            margin-right: 8px;
        }

        .text { color: #cfcfcf; }

        #input-container { 
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
        }

        #message-form { display: flex; gap: 10px; }

        input[type="text"] { 
            flex-grow: 1; 
            padding: 12px; 
            background: #2c2c2c; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 4px;
            outline: none;
        }

        input[type="text"]:focus { border-color: #bb86fc; }

        button { 
            padding: 10px 20px; 
            cursor: pointer; 
            background: #bb86fc; 
            color: #000; 
            border: none; 
            font-weight: bold; 
            border-radius: 4px;
            transition: background 0.3s;
        }

        button:hover { background: #9965f4; }

        .hidden { display: none !important; }

        /* Scrollbar design */
        #chat-box::-webkit-scrollbar { width: 8px; }
        #chat-box::-webkit-scrollbar-track { background: #121212; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Aplikace Chat</h2>
    
    <!-- Všichni vidí chat-box -->
    <div id="chat-box">Načítám historii zpráv...</div>

    <!-- Jen pro lidi co nejsou Sominik -->
    <div id="input-container">
        <form id="message-form">
            <input type="text" id="msg-input" placeholder="Napište zprávu..." maxlength="1000" required>
            <button type="submit" id="send-btn">Odeslat</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAB-g5RMWD2gGquAqyOFBslUegRUG_15eE",
            authDomain: "appka-fb08e.firebaseapp.com",
            databaseURL: "https://appka-fb08e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "appka-fb08e",
            storageBucket: "appka-fb08e.firebasestorage.app",
            messagingSenderId: "1093616123944",
            appId: "1:1093616123944:web:3fb16b2d1c3c3d4c14b51d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        // Výzva k zadání přezdívky
        let nickname = prompt("Jakou chcete mít přezdívku?");
        if (!nickname || nickname.trim() === "") nickname = "Anonym";

        const inputContainer = document.getElementById('input-container');
        const chatBox = document.getElementById('chat-box');
        const messageForm = document.getElementById('message-form');
        const msgInput = document.getElementById('msg-input');

        // PRAVIDLO: Sominik nevidí formulář pro psaní, ale zprávy vidí
        if (nickname === "Sominik") {
            inputContainer.classList.add('hidden');
        }

        // Posílání zpráv
        messageForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (text) {
                push(messagesRef, {
                    username: nickname,
                    message: text,
                    timestamp: serverTimestamp()
                });
                msgInput.value = "";
            }
        });

        // Přidávání zpráv do okna (vidí všichni)
        chatBox.innerHTML = ""; 
        onChildAdded(messagesRef, (data) => {
            const val = data.val();
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `<span class="nickname">${val.username}</span> <span class="text">napsal/a: ${val.message}</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>

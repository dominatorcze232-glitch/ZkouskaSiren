<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-User Chat</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        
        .btn { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary); color: #000; }
        .btn-sub { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); margin-top: 20px; }
        .btn-admin { position: absolute; top: 10px; right: 10px; padding: 5px 10px; font-size: 12px; background: #333; color: #fff; border-radius: 4px; border: none; cursor: pointer; }
        
        #user-list { list-style: none; padding: 0; }
        #user-list li { background: #2c2c2c; margin: 10px 0; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; border: 1px solid #444; transition: 0.2s; }
        #user-list li:hover { border-color: var(--primary); background: #333; }

        #chat-section, #register-section { display: none; position: relative; }
        #message-list { height: 350px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; background: #151515; border-radius: 4px; }
        .message { padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; word-break: break-word; }
        .del-btn { background: var(--error); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 10px; }

        input { width: 100%; padding: 12px; margin: 8px 0; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container" id="main-app" style="display: none;">
    <!-- HLAVNÍ NABÍDKA -->
    <div id="menu-section">
        <h2 id="welcome-msg">Komu chcete napsat?</h2>
        <ul id="user-list">
            <!-- Tady se generují tlačítka -->
        </ul>
        <button class="btn btn-sub" onclick="showRegister()">Chcete aby vám taky psali? Klikněte zde!</button>
    </div>

    <!-- CHAT SEKCE -->
    <div id="chat-section">
        <button id="admin-login-btn" class="btn-admin">Přihlásit se na tento účet?</button>
        <h2 id="chat-title">Napsat zprávu</h2>
        <div id="message-list" class="hidden"></div>
        <form id="msg-form">
            <input type="text" id="msg-input" placeholder="Zadejte text (max 1000 znaků)..." maxlength="1000" required>
            <button type="submit" class="btn btn-main">Odeslat</button>
        </form>
        <button class="btn btn-sub" onclick="location.reload()">Zpět do menu</button>
    </div>

    <!-- REGISTRACE -->
    <div id="register-section">
        <h2>Nová registrace</h2>
        <input type="text" id="reg-name" placeholder="Jakou chcete mít přezdívku?">
        <input type="password" id="reg-pass" placeholder="Vaše heslo">
        <button class="btn btn-main" onclick="handleRegister()">Potvrdit</button>
        <button class="btn btn-sub" onclick="location.reload()">Zrušit</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, remove, set, onValue } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAB-g5RMWD2gGquAqyOFBslUegRUG_15eE",
        authDomain: "appka-fb08e.firebaseapp.com",
        databaseURL: "https://appka-fb08e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "appka-fb08e",
        storageBucket: "appka-fb08e.firebasestorage.app",
        appId: "1:1093616123944:web:3fb16b2d1c3c3d4c14b51d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // --- DOTAZ NA PŘEZDÍVKU HNED NA ZAČÁTKU ---
    let myNickname = prompt("Jakou chcete mít přezdívku?");
    if(!myNickname || myNickname.trim() === "") myNickname = "Anonym";
    
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('welcome-msg').innerText = `Ahoj ${myNickname}, komu napíšeme?`;

    let currentTarget = "";
    let targetPassword = "";

    // --- NAČÍTÁNÍ SEZNAMU UŽIVATELŮ ---
    const userListUI = document.getElementById('user-list');
    onValue(ref(db, 'users'), (snapshot) => {
        userListUI.innerHTML = "";
        
        // Vždy přidat Dominika jako první
        addListItem("Dominik", "6852");

        // Přidat ostatní z databáze
        snapshot.forEach((child) => {
            const u = child.val();
            if(u.name !== "Dominik") {
                addListItem(u.name, u.password);
            }
        });
    });

    function addListItem(name, pass) {
        const li = document.createElement('li');
        li.innerText = `Napsat ${name}`;
        li.onclick = () => openChat(name, pass);
        userListUI.appendChild(li);
    }

    // --- LOGIKA CHATU ---
    window.openChat = (name, pass) => {
        currentTarget = name;
        targetPassword = pass;
        document.getElementById('menu-section').style.display = 'none';
        document.getElementById('chat-section').style.display = 'block';
        document.getElementById('chat-title').innerText = `Píšete uživateli: ${name}`;
        
        const loginBtn = document.getElementById('admin-login-btn');
        loginBtn.innerText = (name === "Dominik") ? "Přihlásit se jako Dominik" : "Přihlásit se na tento účet?";
        
        loginBtn.onclick = () => {
            const passEntry = prompt("Zadejte heslo k tomuto účtu:");
            if(passEntry === targetPassword) {
                document.getElementById('message-list').classList.remove('hidden');
                loadMessages(name);
            } else {
                alert("Špatné heslo!");
            }
        };
    };

    function loadMessages(userName) {
        const list = document.getElementById('message-list');
        list.innerHTML = "";
        onChildAdded(ref(db, 'messages/' + userName), (data) => {
            const m = data.val();
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span>${m.text}</span> <button class="del-btn" onclick="window.deleteMsg('${userName}', '${data.key}')">Smazat</button>`;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        });
    }

    window.deleteMsg = (user, key) => {
        if(confirm("Smazat zprávu?")) {
            remove(ref(db, `messages/${user}/${key}`));
            location.reload(); 
        }
    };

    document.getElementById('msg-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if(input.value.trim()) {
            push(ref(db, 'messages/' + currentTarget), {
                text: input.value,
                sender: myNickname, // Uloží se, ale nikdo (ani Dominik) to neuvidí, protože to nevypisujeme
                time: Date.now()
            });
            input.value = "";
            alert("Odesláno!");
        }
    };

    // --- REGISTRACE ---
    window.showRegister = () => {
        document.getElementById('menu-section').style.display = 'none';
        document.getElementById('register-section').style.display = 'block';
    };

    window.handleRegister = () => {
        const name = document.getElementById('reg-name').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        if(name && pass) {
            set(ref(db, 'users/' + name), { name: name, password: pass });
            alert("Hotovo! Nyní jsi v seznamu.");
            location.reload();
        }
    };
</script>

</body>
</html>

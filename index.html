<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-User Chat</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        
        .btn { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary); color: #000; }
        .btn-sub { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); margin-top: 20px; }
        .btn-admin { position: absolute; top: 10px; right: 10px; padding: 5px 10px; font-size: 12px; background: #333; color: #fff; border-radius: 4px; }
        
        #user-list { list-style: none; padding: 0; }
        #user-list li { background: #2c2c2c; margin: 5px 0; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; border: 1px solid transparent; }
        #user-list li:hover { border-color: var(--primary); }

        #chat-section, #register-section { display: none; position: relative; }
        #message-list { height: 300px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; background: #151515; }
        .message { padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .del-btn { color: var(--error); cursor: pointer; font-size: 12px; }

        input { width: 100%; padding: 10px; margin: 8px 0; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- HLAVNÍ NABÍDKA -->
    <div id="menu-section">
        <h2>Komu chcete napsat?</h2>
        <ul id="user-list">
            <li onclick="openChat('Dominik', '6852')">Napsat Dominikovi</li>
        </ul>
        <button class="btn btn-sub" onclick="showRegister()">Chcete aby vám taky psali? Klikněte zde!</button>
    </div>

    <!-- CHAT SEKCE -->
    <div id="chat-section">
        <button id="admin-login-btn" class="btn-admin">Přihlásit se na tento účet?</button>
        <h2 id="chat-title">Chat</h2>
        <div id="message-list" class="hidden"></div>
        <form id="msg-form">
            <input type="text" id="msg-input" placeholder="Zadejte text (max 1000 znaků)..." maxlength="1000" required>
            <button type="submit" class="btn btn-main">Odeslat</button>
        </form>
        <button class="btn btn-sub" onclick="location.reload()">Zpět do menu</button>
    </div>

    <!-- REGISTRACE NOVÉHO JMÉNA -->
    <div id="register-section">
        <h2>Nová registrace</h2>
        <input type="text" id="reg-name" placeholder="Jakou chcete mít přezdívku?">
        <input type="password" id="reg-pass" placeholder="Vaše heslo">
        <button class="btn btn-main" onclick="handleRegister()">Potvrdit</button>
        <button class="btn btn-sub" onclick="location.reload()">Zrušit</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, remove, set, onValue } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAB-g5RMWD2gGquAqyOFBslUegRUG_15eE",
        authDomain: "appka-fb08e.firebaseapp.com",
        databaseURL: "https://appka-fb08e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "appka-fb08e",
        storageBucket: "appka-fb08e.firebasestorage.app",
        appId: "1:1093616123944:web:3fb16b2d1c3c3d4c14b51d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentTarget = "";
    let correctPass = "";

    // --- NAČÍTÁNÍ UŽIVATELŮ ---
    onValue(ref(db, 'users'), (snapshot) => {
        const userList = document.getElementById('user-list');
        userList.innerHTML = '<li onclick="openChat(\'Dominik\', \'6852\')">Napsat Dominikovi</li>';
        snapshot.forEach((child) => {
            const data = child.val();
            const li = document.createElement('li');
            li.innerText = `Napsat ${data.name}`;
            li.onclick = () => openChat(data.name, data.password);
            userList.appendChild(li);
        });
    });

    // --- FUNKCE ---
    window.showRegister = () => {
        document.getElementById('menu-section').style.display = 'none';
        document.getElementById('register-section').style.display = 'block';
    };

    window.handleRegister = () => {
        const name = document.getElementById('reg-name').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        if(name && pass) {
            set(ref(db, 'users/' + name), { name: name, password: pass });
            alert("Účet vytvořen!");
            location.reload();
        }
    };

    window.openChat = (targetName, pass) => {
        currentTarget = targetName;
        correctPass = pass;
        document.getElementById('menu-section').style.display = 'none';
        document.getElementById('chat-section').style.display = 'block';
        document.getElementById('chat-title').innerText = "Píšete: " + targetName;
        document.getElementById('admin-login-btn').innerText = (targetName === "Dominik") ? "Přihlásit se jako Dominik" : "Přihlásit se na tento účet?";
        
        document.getElementById('admin-login-btn').onclick = () => {
            const entered = prompt("Zadejte heslo:");
            if(entered === correctPass) {
                document.getElementById('message-list').classList.remove('hidden');
                loadMessages();
            } else {
                alert("Špatné heslo!");
            }
        };
    };

    function loadMessages() {
        const list = document.getElementById('message-list');
        list.innerHTML = "";
        onChildAdded(ref(db, 'messages/' + currentTarget), (data) => {
            const msg = data.val();
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span>${msg.text}</span> <span class="del-btn" onclick="window.delMsg('${data.key}')">✖</span>`;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        });
    }

    window.delMsg = (key) => {
        if(confirm("Smazat?")) remove(ref(db, `messages/${currentTarget}/${key}`));
        location.reload(); // Pro jednoduchost obnovíme
    };

    document.getElementById('msg-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if(input.value.trim()) {
            push(ref(db, 'messages/' + currentTarget), {
                text: input.value,
                time: Date.now()
            });
            input.value = "";
            alert("Zpráva odeslána!");
        }
    };
</script>

</body>
</html>
